services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-store-postgres
    environment:
      POSTGRES_DB: atelier_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atelier_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
